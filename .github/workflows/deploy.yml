name: Deploy FairWall

on:
  push:
    branches: [main]
  workflow_dispatch:      # allow manual trigger from GitHub UI

env:
  PROJECT_ID:   fairwall-2026
  REGION:       us-central1
  SERVICE_NAME: fairwall-api
  IMAGE:        gcr.io/fairwall-2026/fairwall-api

jobs:
  # ── Backend → Cloud Run ──────────────────────────────────────────────────────
  deploy-backend:
    name: Build & Deploy API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: docker build -t $IMAGE .

      - name: Push to Container Registry
        run: docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --timeout 300 \
            --set-env-vars "GCP_PROJECT=$PROJECT_ID,GEMMA_BACKEND=none,APP_ENV=production,LOG_LEVEL=INFO" \
            --quiet

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME \
            --platform managed --region $REGION \
            --format 'value(status.url)')
          echo "Backend live at: $URL"
          echo "BACKEND_URL=$URL" >> $GITHUB_ENV

  # ── Frontend → Firebase Hosting ──────────────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Dashboard
    runs-on: ubuntu-latest
    needs: deploy-backend        # run after backend so URL is ready

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        env:
          VITE_API_URL: ${{ secrets.BACKEND_URL }}
          VITE_DEFAULT_API_KEY: fw-demo-key-2026
        run: bun run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SA_KEY }}
          channelId: live
          projectId: fairwall-2026
